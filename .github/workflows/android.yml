name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite compilar manualmente desde la pestaña de Actions en GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Descargamos los scripts y el archivo binario del Gradle Wrapper oficial
    # para tener un entorno Gradle 100% estándar e independiente de la máquina virtual.
    - name: Descargar Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.4/gradle/wrapper/gradle-wrapper.jar
        curl -L -o gradlew https://raw.githubusercontent.com/gradle/gradle/v8.4/gradlew
        curl -L -o gradlew.bat https://raw.githubusercontent.com/gradle/gradle/v8.4/gradlew.bat
        chmod +x gradlew

    # Configuramos el entorno de Gradle dejando que el Wrapper maneje las versiones
    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v3

    # Compilamos usando el Wrapper estándar local
    - name: Compilar APK con Gradle Wrapper
      run: ./gradlew assembleDebug

    - name: Subir Archivo APK como Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: checkealo-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
