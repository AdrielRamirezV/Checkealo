name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite compilar manualmente desde la pestaña de Actions en GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Configuramos Gradle para usar la versión 8.4 de forma global en la máquina virtual.
    # Esto evita descargar el wrapper manualmente y previene problemas de formato de archivos (Exit Code 127).
    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.4'

    # Compilamos directamente usando el comando global "gradle" a la versión 8.4
    - name: Compilar APK con Gradle 8.4
      run: gradle assembleDebug

    - name: Subir Archivo APK como Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: checkealo-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
