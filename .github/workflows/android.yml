name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permite compilar manualmente desde la pestaña de Actions en GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Configuramos el entorno de Gradle (esto optimiza la caché y la velocidad de compilación)
    - name: Configurar Gradle
      uses: gradle/actions/setup-gradle@v3

    # Ejecutamos la compilación directamente usando el comando "gradle" global pre-instalado
    # en la máquina virtual de GitHub, evitando conflictos de red con el Wrapper.
    - name: Compilar APK con Gradle Global
      run: gradle assembleDebug

    - name: Subir Archivo APK como Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: checkealo-app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
